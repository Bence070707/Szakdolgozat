<dialog #dialogRef class="modal">
<div class="modal-box">
    <h3 class="font-bold text-lg">{{message}}</h3>
    <div class="modal-action">
        <button (click)="cancel()" class="btn btn-outline">
            Mégsem
        </button>
        <button (click)="confirm()" class="btn btn-primary">
            Megerősítés
        </button>
    </div>
</div>
</dialog>
