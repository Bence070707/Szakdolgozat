<div class="w-full h-[85vh] flex justify-center items-center">
    <fieldset class="fieldset">
        <legend class="fieldset-legend font-semibold text-lg">Adja meg az email címét!</legend>
        <div class="flex gap-2">
            <input [value]="email().email" (input)="email().email = ($any($event.target).value)" type="text"
                class="input shrink-0" placeholder="Email cím..." />
            <button (click)="confirmSubmit()" class="btn btn-primary">
                Elküldés
            </button>
        </div>
        <p class="label">Egy link elküldésre kerül a megadott email címre, <br>ahol folytatni tudja a jelszó
            helyreállítását.</p>
    </fieldset>
</div>
